<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteNest — Suas anotações, organizadas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">N</div>
      <span class="brand-name">NoteNest</span>
    </div>

    <button class="btn-new" id="btn-new">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Nova nota
    </button>

    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Buscar notas..." />
    </div>

    <div class="notes-list" id="notes-list"></div>

    <div class="sidebar-footer">
      <span id="note-count">0 notas</span>
    </div>
  </aside>

  <!-- EDITOR -->
  <main class="editor-area" id="editor-area">
    <div class="editor-empty" id="editor-empty">
      <div class="empty-icon-wrap">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24" opacity="0.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
      </div>
      <p class="empty-headline">Nenhuma nota selecionada</p>
      <p class="empty-sub">Selecione uma nota ou crie uma nova</p>
      <button class="btn-empty-new" id="btn-empty-new">Criar primeira nota</button>
    </div>

    <div class="editor-content hidden" id="editor-content">
      <div class="editor-toolbar">
        <input type="text" class="note-title-input" id="note-title-input" placeholder="Título da nota..." />
        <div class="toolbar-actions">
          <select id="note-color" title="Cor da nota">
            <option value="default">⚪ Padrão</option>
            <option value="yellow">🟡 Amarelo</option>
            <option value="green">🟢 Verde</option>
            <option value="blue">🔵 Azul</option>
            <option value="pink">🩷 Rosa</option>
          </select>
          <button class="btn-icon" id="btn-delete-note" title="Excluir nota">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <div class="editor-meta" id="editor-meta"></div>
      <div class="note-body" id="note-body" contenteditable="true" data-placeholder="Comece a escrever..."></div>
      <div class="word-count" id="word-count">0 palavras</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
